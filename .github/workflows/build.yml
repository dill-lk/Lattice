name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Trigger on tag creation (for release builds)
  create:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    # Skip check/test for tag events (already passed on main)
    if: github.event_name != 'create'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings
      
      - name: Check compilation
        run: cargo check --all --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    # Skip check/test for tag events (already passed on main)
    if: github.event_name != 'create'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        run: cargo test --all --all-features --no-fail-fast
      
      - name: Run doc tests
        run: cargo test --doc --all --all-features

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    # Only run on push to main (not on tags or PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, test]
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
      created: ${{ steps.create_tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        id: create_tag
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "✅ Created tag: $TAG"
          fi

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    # Build only when a tag is created (via create event)
    if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: lattice-linux-amd64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: lattice-windows-amd64
            archive_ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: lattice-macos-amd64
            archive_ext: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.artifact_name }}.tar.gz \
            lattice-node lattice-cli lattice-miner

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "target\${{ matrix.target }}\release"
          Compress-Archive `
            -Path "$dir\lattice-node.exe","$dir\lattice-cli.exe","$dir\lattice-miner.exe" `
            -DestinationPath "${{ github.workspace }}\${{ matrix.artifact_name }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    # Only create release when build completes (tag event)
    if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
